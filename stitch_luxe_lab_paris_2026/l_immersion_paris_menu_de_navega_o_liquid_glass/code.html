<style>
        body {
            background-color: #fbf9f8;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling behind overlay */
        }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .refraction-bg {
            background: radial-gradient(circle at 20% 30%, rgba(254, 212, 136, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(119, 90, 25, 0.1) 0%, transparent 40%);
        }

        .nav-item-hover {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .nav-item-hover:hover {
            letter-spacing: 0.1em;
            color: #775a19;
            transform: translateX(8px);
        }

        .close-button-ring {
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .close-button-ring:hover {
            transform: rotate(90deg) scale(1.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const closeBtn = document.querySelector('.close-button-ring');
            const overlay = document.getElementById('overlay-menu');
            const navLinks = document.querySelectorAll('.nav-item-hover');

            closeBtn.addEventListener('click', () => {
                overlay.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.05)';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 500);
            });

            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    // Simulation of navigation
                    console.log(`Navigating to: ${e.target.innerText}`);
                });
            });

            // Gentle parallax movement based on mouse/gyroscope (Desktop focus)
            document.addEventListener('mousemove', (e) => {
                const x = (e.clientX / window.innerWidth - 0.5) * 15;
                const y = (e.clientY / window.innerHeight - 0.5) * 15;
                const refraction = document.querySelector('.refraction-bg');
                if(refraction) {
                    refraction.style.backgroundPosition = `${50 + x}% ${50 + y}%`;
                }
            });
        });
    </script>
